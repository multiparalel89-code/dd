<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>120 DIVISION</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Pirata+One&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg:#2C2C2C;
  --surface:#363636;
  --text:#E0E0E0;
  --muted:#999;
  --accent:#EF4444;
  --shadow-light:#3a3a3a;
  --shadow-dark:#1f1f1f;
}

body[data-theme="light"] {
  --bg:#E0E0E0;
  --surface:#F0F0F0;
  --text:#111;
  --muted:#555;
  --accent:#000;
  --shadow-light:#fff;
  --shadow-dark:#bcbcbc;
}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* neumorphism */
.neu{
  background:var(--surface);
  border-radius:22px;
  box-shadow:8px 8px 18px var(--shadow-dark),
             -8px -8px 18px var(--shadow-light);
}
.neu-inset{
  background:var(--bg);
  border-radius:18px;
  box-shadow:inset 6px 6px 12px var(--shadow-dark),
             inset -6px -6px 12px var(--shadow-light);
}

/* animation */
.fade{animation:fade .3s;}
@keyframes fade{from{opacity:0;transform:translateY(10px)}}

/* toast */
.toast{
  position:fixed;top:80px;left:50%;
  transform:translateX(-50%);
  background:var(--surface);
  padding:10px 20px;
  border-radius:12px;
  box-shadow:6px 6px 12px var(--shadow-dark),
             -6px -6px 12px var(--shadow-light);
}

.section{display:none}
.section.active{display:block}
</style>
</head>

<body data-theme="dark">

<!-- HEADER -->
<header class="fixed top-0 w-full p-4 neu flex justify-between z-50">
<div></div>
<b class="tracking-widest">120 DIVISION</b>
<div id="avatar" class="w-10 h-10 neu rounded-full flex items-center justify-center"></div>
</header>

<!-- MAIN -->
<main class="pt-20 pb-24 px-4 space-y-6">

<!-- HOME -->
<section id="home" class="section active fade">

<div class="swiper rounded-b-[40px] overflow-hidden">
<div class="swiper-wrapper">
<div class="swiper-slide"><img src="https://picsum.photos/500/300?1"/></div>
<div class="swiper-slide"><img src="https://picsum.photos/500/300?2"/></div>
</div>
</div>

<div class="neu p-5 text-lg" style="font-family:Pirata One">
120 DIVISION — Музыкальное движение из Минска
</div>

</section>

<!-- SHOP -->
<section id="shop" class="section fade">
<div id="products" class="space-y-4"></div>
<button id="addBtn" class="neu p-4 w-full hidden">+ Добавить</button>
</section>

<!-- CHAT USER -->
<section id="chat" class="section fade">
<div id="chatBox" class="h-80 overflow-y-auto space-y-2"></div>
<div class="flex gap-2">
<input id="msg" class="neu-inset flex-1 p-3"/>
<button onclick="sendMsg()" class="neu px-4">→</button>
</div>
</section>

<!-- PROFILE -->
<section id="profile" class="section fade space-y-4">
<div class="neu p-4 text-center">
<div id="pAvatar" class="w-16 h-16 mx-auto neu rounded-full flex items-center justify-center"></div>
<h2 id="name"></h2>
</div>

<div class="neu p-4">
<b>Корзина</b>
<div id="cart"></div>
</div>

<div class="neu p-4 flex justify-between">
Сменить тему
<button onclick="toggleTheme()">🌗</button>
</div>
</section>

<!-- ADMIN -->
<section id="admin" class="section fade">
<div id="dialogs"></div>
<div id="adminChat" class="hidden">
<div id="adminMsgs" class="h-80 overflow-y-auto"></div>
<input id="adminInput" class="neu-inset w-full p-3 mt-2"/>
<button onclick="adminSend()" class="neu w-full mt-2">Отправить</button>
</div>
</section>

</main>

<!-- NAV -->
<nav class="fixed bottom-0 w-full flex justify-around p-3 neu">
<button onclick="nav('home')"><i class="fa fa-house"></i></button>
<button onclick="nav('shop')"><i class="fa fa-bag-shopping"></i></button>
<button onclick="nav('chat')"><i class="fa fa-comment"></i></button>
<button onclick="nav('profile')"><i class="fa fa-user"></i></button>
<button id="adminBtn" onclick="nav('admin')" class="hidden"><i class="fa fa-shield"></i></button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

// STATE
const DB={
  get:(k)=>JSON.parse(localStorage.getItem(k)||"[]"),
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
}

// USER
const user={id:1,name:"User"};
avatar.innerText=user.name[0];
pAvatar.innerText=user.name[0];
name.innerText=user.name;

// ADMIN
const ADMIN=[1];
if(ADMIN.includes(user.id)){
 adminBtn.classList.remove("hidden");
 addBtn.classList.remove("hidden");
}

// NAV
function nav(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// THEME
function toggleTheme(){
let t=document.body.dataset.theme==="dark"?"light":"dark";
document.body.dataset.theme=t;
localStorage.setItem("theme",t);
}
document.body.dataset.theme=localStorage.getItem("theme")||"dark";

// TOAST
function toast(t){
let el=document.createElement("div");
el.className="toast";
el.innerText=t;
document.body.append(el);
setTimeout(()=>el.remove(),2000);
}

// PRODUCTS
let products=DB.get("products");

function renderProducts(){
productsEl.innerHTML="";
products.forEach((p,i)=>{
productsEl.innerHTML+=`
<div class="neu p-4">
<div class="swiper">
<div class="swiper-wrapper">
${p.images.map(img=>`<div class="swiper-slide"><img src="${img}"/></div>`).join("")}
</div>
</div>
<h3>${p.name}</h3>
<p>${p.price}₽</p>
<button onclick="addCart(${i})">Купить</button>
</div>`;
});
}
const productsEl=document.getElementById("products");
renderProducts();

addBtn.onclick=()=>{
let name=prompt("Название");
let price=prompt("Цена");
let imgs=prompt("URL через ,").split(",");
products.push({name,price,images:imgs});
DB.set("products",products);
renderProducts();
toast("Добавлено");
}

// CART
let cart=DB.get("cart");

function addCart(i){
cart.push(products[i]);
DB.set("cart",cart);
renderCart();
toast("В корзине");
}

function renderCart(){
cartEl.innerHTML="";
cart.forEach((c,i)=>{
cartEl.innerHTML+=`<div>${c.name} <button onclick="delCart(${i})">x</button></div>`;
});
}
function delCart(i){
cart.splice(i,1);
DB.set("cart",cart);
renderCart();
}
const cartEl=document.getElementById("cart");
renderCart();

// CHAT USER
let chats=DB.get("chats");

function sendMsg(){
let text=msg.value;
if(!text)return;
chats.push({user:user.id,text,role:"user"});
DB.set("chats",chats);
msg.value="";
renderChat();
}

function renderChat(){
chatBox.innerHTML="";
chats.filter(c=>c.user==user.id).forEach(m=>{
chatBox.innerHTML+=`<div class="neu p-2">${m.text}</div>`;
});
}
renderChat();

// ADMIN CHAT
let currentUser=null;

function renderDialogs(){
dialogs.innerHTML="";
let users=[...new Set(chats.map(c=>c.user))];
users.forEach(u=>{
dialogs.innerHTML+=`<div onclick="openChat(${u})" class="neu p-3">User ${u}</div>`;
});
}
renderDialogs();

function openChat(u){
currentUser=u;
adminChat.classList.remove("hidden");
renderAdminChat();
}

function renderAdminChat(){
adminMsgs.innerHTML="";
chats.filter(c=>c.user==currentUser).forEach(m=>{
adminMsgs.innerHTML+=`
<div class="${m.role=='admin'?'text-red-400':''}">
${m.text}
</div>`;
});
}

function adminSend(){
let text=adminInput.value;
chats.push({user:currentUser,text,role:"admin"});
DB.set("chats",chats);
adminInput.value="";
renderAdminChat();
}

// INIT SWIPER
new Swiper(".swiper");

</script>

</body>
</html>
