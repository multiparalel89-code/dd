<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>120 DIVISION | OFFICIAL</title>
    
    <!-- Шрифты и Стили -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        :root { --glass: rgba(255, 255, 255, 0.6); --border: rgba(255, 255, 255, 0.3); }
        body { background: #f0f0f0; color: #000; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Готический шрифт */
        .gothic-text { font-family: 'Pirata One', cursive; font-size: 1.6rem; line-height: 1.2; color: #000; }

        /* Эффект стекла */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid var(--border); 
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        /* Узоры фона */
        .pattern { position: absolute; border-radius: 50%; filter: blur(60px); z-index: -1; }
        .p1 { width: 300px; height: 300px; background: #d1d1d1; top: -50px; right: -50px; }
        .p2 { width: 250px; height: 250px; background: #e2e2e2; bottom: 100px; left: -50px; }
        .p3 { width: 200px; height: 200px; background: #cccccc; top: 40%; left: 30%; }

        /* Слайдер */
        .swiper { width: 100%; height: 300px; border-radius: 15px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Меню */
        #sidebar { transition: 0.4s cubic-bezier(0.85, 0, 0.15, 1); z-index: 1000; }
        .nav-btn { font-weight: 900; letter-spacing: 2px; text-transform: uppercase; padding: 20px; border-bottom: 1px solid #eee; width: 100%; text-align: left; }

        /* Соцсети */
        .social-btn { width: 45px; height: 45px; background: #000; color: #fff; border-radius: 50%; display: flex; items-center: center; justify-content: center; transition: 0.3s; }
        .social-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="pattern p1"></div>
    <div class="pattern p2"></div>
    <div class="pattern p3"></div>

    <!-- Боковое меню -->
    <div id="sidebar" class="fixed inset-y-0 left-0 w-full bg-white transform -translate-x-full">
        <div class="p-8 flex justify-between items-center">
            <img src="logo.png" class="h-8" alt="Logo">
            <button onclick="toggleMenu()" class="text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="mt-10">
            <button onclick="show('home')" class="nav-btn">ГЛАВНАЯ</button>
            <button onclick="show('profile')" class="nav-btn">ПРОФИЛЬ</button>
            <button onclick="show('shop')" class="nav-btn">МАГАЗИН</button>
            <button onclick="show('support')" class="nav-btn">ПОДДЕРЖКА</button>
        </nav>
    </div>

    <!-- Шапка -->
    <header class="p-6 flex justify-between items-center z-50">
        <button onclick="toggleMenu()" class="text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
        <div class="font-black tracking-widest text-sm uppercase">120 DIVISION</div>
        <div id="user-avatar" class="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center font-bold">?</div>
    </header>

    <main class="flex-1 overflow-y-auto px-6 pb-20">
        
        <!-- ГЛАВНАЯ -->
        <section id="section-home" class="space-y-6">
            <div class="glass-card p-8 mt-4">
                <p class="gothic-text">
                    120 DIVISION — Музыкальное движение из Минска.<br><br>
                    Мы занимаемся:<br>
                    • Сведением и мастерингом<br>
                    • Битмейкингом<br>
                    • Дизайном обложек<br>
                    • Съемкой и монтажом видео.
                </p>
            </div>

            <div class="flex justify-center space-x-4 py-4">
                <a href="https://youtube.com/@120division?si=6unOjWLU7ZUiJCB5" class="social-btn"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://t.me/division120" class="social-btn"><i class="fa-brands fa-telegram"></i></a>
                <a href="https://www.instagram.com/120division?igsh=anQxcGJxcWo3aDFz" class="social-btn"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@120division" class="social-btn"><i class="fa-brands fa-tiktok"></i></a>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="glass-card p-6 h-32 flex items-center justify-center font-black italic">ARTISTRY</div>
                <div class="glass-card p-6 h-32 flex items-center justify-center font-black italic text-gray-400 uppercase">Production</div>
                <div class="glass-card p-6 h-32 flex items-center justify-center font-black italic">Vision</div>
            </div>
        </section>

        <!-- МАГАЗИН -->
        <section id="section-shop" class="hidden space-y-6 pt-4">
            <div id="admin-add-btn" class="hidden">
                <button onclick="openAddModal()" class="w-full bg-black text-white p-4 font-black rounded-xl mb-6">+ ДОБАВИТЬ ТОВАР</button>
            </div>
            
            <div id="products-list" class="space-y-10">
                <!-- Товары появятся здесь -->
            </div>
        </section>

        <!-- ПРОФИЛЬ -->
        <section id="section-profile" class="hidden pt-4">
            <div class="glass-card p-10 text-center">
                <h2 id="u-name" class="text-3xl font-black uppercase">User Name</h2>
                <p id="u-id" class="text-gray-400 mt-2 font-bold tracking-widest">ID: 00000000</p>
            </div>
        </section>

        <!-- ПОДДЕРЖКА -->
        <section id="section-support" class="hidden h-full flex flex-col pt-4">
            <div id="chat-box" class="flex-1 space-y-4 overflow-y-auto pb-40 px-2">
                <div class="bg-gray-200 p-4 rounded-2xl rounded-bl-none text-sm font-bold max-w-[80%]">ЧЕМ МЫ МОЖЕМ ВАМ ПОМОЧЬ?</div>
            </div>
            <div class="fixed bottom-0 left-0 w-full p-6 bg-white border-t flex items-center space-x-3">
                <input type="text" id="chat-in" placeholder="Ваш вопрос..." class="flex-1 bg-gray-100 p-4 rounded-xl text-sm focus:outline-none">
                <button onclick="sendMsg()" class="bg-black text-white p-4 rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </section>

    </main>

    <!-- Модалка добавления -->
    <div id="add-modal" class="fixed inset-0 bg-black/80 z-[2000] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full p-8 rounded-3xl space-y-4">
            <h2 class="font-black">НОВЫЙ ТОВАР</h2>
            <input type="text" id="p-title" placeholder="Название" class="w-full border p-4 rounded-xl">
            <textarea id="p-imgs" placeholder="Ссылки на фото через запятую" class="w-full border p-4 rounded-xl h-32"></textarea>
            <input type="text" id="p-price" placeholder="Цена" class="w-full border p-4 rounded-xl">
            <div class="flex space-x-2">
                <button onclick="saveProduct()" class="flex-1 bg-black text-white p-4 font-black rounded-xl">СОХРАНИТЬ</button>
                <button onclick="closeAddModal()" class="flex-1 bg-gray-200 p-4 font-black rounded-xl text-xs">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const ADMIN_IDS = [12345678]; // ЗАМЕНИ НА СВОЙ ID
        const u = tg.initDataUnsafe?.user;

        if(u) {
            document.getElementById('u-name').innerText = u.first_name.toUpperCase();
            document.getElementById('u-id').innerText = 'ID: ' + u.id;
            document.getElementById('user-avatar').innerText = u.first_name[0];
            if(ADMIN_IDS.includes(u.id)) document.getElementById('admin-add-btn').classList.remove('hidden');
        }

        function toggleMenu() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('-translate-x-full');
        }

        function show(id) {
            ['home', 'shop', 'profile', 'support'].forEach(s => {
                document.getElementById('section-' + s).classList.toggle('hidden', s !== id);
            });
            toggleMenu();
            if(id === 'shop') renderProducts();
            if(id === 'support') renderChat();
        }

        // --- МАГАЗИН ---
        function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

        function saveProduct() {
            const title = document.getElementById('p-title').value;
            const imgs = document.getElementById('p-imgs').value.split(',');
            const price = document.getElementById('p-price').value;
            
            if(!title || !price) return;

            const products = JSON.parse(localStorage.getItem('products_120') || '[]');
            products.push({ title, imgs, price });
            localStorage.setItem('products_120', JSON.stringify(products));
            
            closeAddModal();
            renderProducts();
        }

        function renderProducts() {
            const list = document.getElementById('products-list');
            const products = JSON.parse(localStorage.getItem('products_120') || '[]');
            list.innerHTML = '';

            products.forEach((p, idx) => {
                const item = document.createElement('div');
                item.className = 'space-y-4';
                
                let slides = '';
                p.imgs.forEach(img => {
                    slides += `<div class="swiper-slide"><img src="${img.trim()}"></div>`;
                });

                item.innerHTML = `
                    <div class="swiper swiper-${idx}">
                        <div class="swiper-wrapper">${slides}</div>
                        <div class="swiper-pagination"></div>
                    </div>
                    <div class="p-2">
                        <h3 class="gothic-text">${p.title}</h3>
                        <p class="font-black text-xl mt-2">${p.price} RUB</p>
                        <button class="w-full bg-black text-white p-4 font-black rounded-xl mt-4 uppercase text-xs">Заказать</button>
                    </div>
                `;
                list.appendChild(item);
                
                new Swiper(`.swiper-${idx}`, {
                    pagination: { el: '.swiper-pagination' },
                });
            });
        }

        // --- ЧАТ ---
        function sendMsg() {
            const cin = document.getElementById('chat-in');
            if(!cin.value) return;
            const history = JSON.parse(localStorage.getItem('chat_120') || '[]');
            history.push({ r: 'u', t: cin.value });
            localStorage.setItem('chat_120', JSON.stringify(history));
            
            // Если бот включен, он получит данные:
            tg.sendData(JSON.stringify({ a: "MSG", text: cin.value }));
            
            cin.value = '';
            renderChat();
        }

        function renderChat() {
            const box = document.getElementById('chat-box');
            const history = JSON.parse(localStorage.getItem('chat_120') || '[]');
            box.innerHTML = '<div class="bg-gray-200 p-4 rounded-2xl rounded-bl-none text-sm font-bold max-w-[80%] uppercase">ЧЕМ МЫ МОЖЕМ ВАМ ПОМОЧЬ?</div>';
            history.forEach(m => {
                const d = document.createElement('div');
                d.className = m.r === 'u' 
                    ? 'bg-black text-white p-4 rounded-2xl rounded-br-none text-sm font-bold max-w-[80%] self-end ml-auto'
                    : 'bg-gray-200 p-4 rounded-2xl rounded-bl-none text-sm font-bold max-w-[80%]';
                d.innerText = m.t.toUpperCase();
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        // Рендерим магазин при загрузке
        renderProducts();
    </script>
</body>
</html>
